    percentile: p,

// CLINICAL THRESHOLDS & UTILITIES
// ═══════════════════════════════════════════════
const BOUNDS = { hba1c: [4, 15], bp: [70, 250], ldl: [0.5, 10], egfr: [0, 200] };
const THRESHOLDS = {
  hba1c: { good: 7, amber: 8 },
  bp:    { good: 130, amber: 140 },
  ldl:   { good: 2.6, amber: 3.4 },
  egfr:  { good: 60, amber: 30, inverted: true }
};

function getTrafficLight(key, value) {
  if (value === "" || value === undefined || value === null) return null;
  const n = parseFloat(value);
  if (isNaN(n)) return null;
  const b = BOUNDS[key];
  if (n < b[0] || n > b[1]) return "invalid";
  const th = THRESHOLDS[key];
  if (th.inverted) return n >= th.good ? "good" : n >= th.amber ? "caution" : "alert";
  return n < th.good ? "good" : n <= th.amber ? "caution" : "alert";
}

// URL parameters
function getParams() {
  const sp = new URLSearchParams(window.location.search);
  const pRaw = sp.get('p');
  const tRaw = sp.get('t');
  const p = pRaw !== null ? parseInt(pRaw) : null;
  const t = tRaw !== null ? parseInt(tRaw) : null;
  const relRisk = (p !== null && p >= 80) ? 'high' : 'avg';
  let absRisk = null;
  if (t !== null) {
    absRisk = t > 20 ? 'high' : (t >= 10 ? 'intermediate' : 'normal');
  }
  const isDiabetes = (p !== null && t === null);
  return { p: p || 50, t, relRisk, absRisk, isDiabetes, hasParams: pRaw !== null };
}

// GA4 event helper
function trackEvent(name, params) {
  if (typeof gtag === 'function') gtag('event', name, params);
}

function Wrap({ children, style }) {
  return React.createElement('div', { style: { ...S.wrap, ...style } }, children);

function Section({ id, children, last }) {
  const ref = useRef(null);
  const [vis, setVis] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setVis(true); obs.disconnect(); } }, { threshold: 0.08 });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  // Track section views
  useEffect(() => {
    if (vis && id) trackEvent('section_view', { section_id: id });
  }, [vis, id]);
  return React.createElement('section', {
    id, ref,
    className: 'section-wrap' + (vis ? ' visible' : ''),
    style: last ? S.sectionLast : S.section
  }, React.createElement('div', { style: S.wrap }, children));
}

// ═══════════════════════════════════════════════
function PlateSection({ t, lang }) {
  const [filter, setFilter] = useState("all");
  const [plate, setPlate] = useState({ veg: [], grain: [], protein: [] });
  const [sel, setSel] = useState(null);
  const [fb, setFb] = useState(null);
  const [history, setHistory] = useState([]);
  const max = { veg: 4, grain: 2, protein: 2 };
  const zoneColors = { veg: '#2e7d32', grain: '#f57f17', protein: '#7b1fa2' };
  const foods = FOODS_DATA[lang] || FOODS_DATA.en;
  const filtered = foods.filter(f => filter === "all" ? true : (f.cuisine === filter || f.cuisine === "all"));
  const used = new Set([...Object.values(plate).flat().map(i => i.id), ...history.filter(h => !h.ok).map(h => h.item.id)]);

  function tapItem(item) {
    if (sel && sel.id === item.id) { setSel(null); setFb(null); return; }
    setSel(item); setFb(null);
    trackEvent('plate_item_tap', { item_id: item.id, item_name: item.name });
  }

  function tapZone(zone) {
    if (!sel) { setFb({ type: 'info', msg: t.plate.fbInfo }); return; }
    if (sel.zone === 'avoid') {
      setFb({ type: 'avoid', msg: t.plate.fbAvoid.replace('{name}', sel.name).replace('{reason}', sel.why) });
      setHistory(h => [...h, { item: sel, ok: false }]);
      setSel(null);
      trackEvent('plate_avoid_tap', { item_name: sel.name });
      return;
    }
    if (sel.zone !== zone) {
      setFb({ type: 'wrong', msg: t.plate.fbWrong.replace('{name}', sel.name).replace('{zone}', t.plate.zones[sel.zone]) });
      return;
    }
    if (plate[zone].length >= max[zone]) {
      setFb({ type: 'info', msg: t.plate.fbFull.replace('{n}', max[zone]) });
      setSel(null); return;
    }
    if (plate[zone].find(i => i.id === sel.id)) {
      setFb({ type: 'info', msg: t.plate.fbDupe });
      setSel(null); return;
    }
    setPlate({ ...plate, [zone]: [...plate[zone], sel] });
    setHistory(h => [...h, { item: sel, ok: true }]);
    setFb({ type: 'good', msg: t.plate.fbGood.replace('{name}', sel.name).replace('{desc}', sel.desc.toLowerCase()) });
    setSel(null);
    trackEvent('plate_item_placed', { item_name: sel.name, zone });
  }

  function checkPlate() {
    const total = plate.veg.length + plate.grain.length + plate.protein.length;
    if (!total) { setFb({ type: 'info', msg: t.plate.fbInfo }); return; }
    const ok = plate.veg.length >= 2 && plate.grain.length >= 1 && plate.protein.length >= 1;
    if (ok) {
      const w = history.filter(h => !h.ok).length;
      const r = history.filter(h => h.ok).length;
      const caught = w ? `, ${w} identified` : '';
      setFb({ type: 'done', msg: t.plate.fbDone.replace('{correct}', r).replace('{s}', r > 1 ? 's' : '').replace('{caught}', caught) });
      trackEvent('plate_check', { result: 'balanced', correct: r, avoided: w });
    } else {
      setFb({ type: 'incomplete', msg: t.plate.fbIncomplete });
      trackEvent('plate_check', { result: 'incomplete' });
    }
  }

  function resetPlate() {
    setPlate({ veg: [], grain: [], protein: [] });
    setSel(null); setFb(null); setHistory([]);
  }

  const filterTabs = [
    { key: 'all', label: t.plate.filterAll },
    { key: 'chinese', label: t.plate.filterChinese },
    { key: 'malay', label: t.plate.filterMalay },
    { key: 'indian', label: t.plate.filterIndian }
  ];

  // Feedback box colors
  const fbStyles = {
    info: { bg: 'var(--c-blue-bg)', border: 'var(--c-blue)', color: 'var(--c-blue)' },
    good: { bg: 'var(--c-green-bg)', border: 'var(--c-green)', color: 'var(--c-green)' },
    wrong: { bg: 'var(--c-orange-bg)', border: 'var(--c-orange)', color: 'var(--c-orange)' },
    avoid: { bg: 'var(--c-red-bg)', border: 'var(--c-red)', color: 'var(--c-red)' },
    done: { bg: 'var(--c-green-bg)', border: 'var(--c-green)', color: 'var(--c-green)' },
    incomplete: { bg: 'var(--c-orange-bg)', border: 'var(--c-orange)', color: 'var(--c-orange)' }
  };

  return React.createElement(Section, { id: 'plate' },
    React.createElement('h2', { style: S.h2 }, t.plate.sectionTitle),
    React.createElement('a', {
      href: t.plate.videoUrl, target: '_blank', rel: 'noopener',
      style: { display: 'inline-block', fontSize: 17, fontWeight: 700, color: 'var(--c-blue)', textDecoration: 'none', marginBottom: 12 },
      onClick: () => trackEvent('video_click', { video: 'healthy_plate' })
    }, t.plate.videoLink),
    React.createElement('p', { style: S.p }, t.plate.intro),

    // Filter tabs
    React.createElement('div', { style: { marginBottom: 10 } },
      React.createElement('span', { style: { fontSize: 14, fontWeight: 600, color: 'var(--c-mid)', marginRight: 8 } }, t.plate.filterLabel),
      filterTabs.map(tab =>
        React.createElement('button', {
          key: tab.key,
          onClick: () => setFilter(tab.key),
          style: {
            ...S.pill,
            background: filter === tab.key ? 'var(--c-body)' : '#fff',
            color: filter === tab.key ? '#fff' : 'var(--c-body)',
            borderColor: filter === tab.key ? 'var(--c-body)' : 'var(--c-divider-light)',
            fontSize: 14
          }
        }, tab.label)
      )
    ),

    // Step 1 — food items
    React.createElement('p', { style: { fontSize: 15, fontWeight: 700, color: 'var(--c-mid)', marginBottom: 6 } }, t.plate.step1),
    React.createElement('div', {
      style: { display: 'flex', flexWrap: 'wrap', gap: 6, marginBottom: 16, maxHeight: 220, overflowY: 'auto', padding: '4px 0' }
    },
      filtered.filter(f => !used.has(f.id)).map(item =>
        React.createElement('button', {
          key: item.id,
          onClick: () => tapItem(item),
          style: {
            ...S.pill,
            background: sel && sel.id === item.id ? (item.zone === 'avoid' ? 'var(--c-red-bg)' : 'var(--c-green-bg)') : '#fff',
            borderColor: sel && sel.id === item.id ? (item.zone === 'avoid' ? 'var(--c-red)' : 'var(--c-green)') : 'var(--c-divider-light)',
            display: 'flex', alignItems: 'center', gap: 6
          }
        },
          React.createElement('span', null, item.emoji),
          React.createElement('span', null, item.name),
          item.zone === 'avoid' && React.createElement('span', { style: { color: 'var(--c-orange)' } }, '⚠️')
        )
      )
    ),

    // Step 2 — plate zones
    React.createElement('p', { style: { fontSize: 15, fontWeight: 700, color: 'var(--c-mid)', marginBottom: 8 } }, t.plate.step2),
    React.createElement('div', {
      style: { display: 'grid', gridTemplateColumns: '1fr 2fr 1fr', gap: 8, maxWidth: 520, margin: '0 auto 16px' }
    },
      ['protein', 'veg', 'grain'].map(zone => {
        const zc = zoneColors[zone];
        const items = plate[zone];
        const mx = max[zone];
        return React.createElement('div', {
          key: zone,
          onClick: () => tapZone(zone),
          style: {
            border: `3px solid ${zc}`, borderRadius: 'var(--r)', padding: 10, minHeight: 100,
            cursor: 'pointer', transition: 'background 0.15s', background: items.length > 0 ? `${zc}11` : '#fff', textAlign: 'center'
          }
        },
          React.createElement('div', {
            style: { fontSize: 13, fontWeight: 800, color: zc, marginBottom: 4 }
          }, t.plate.zones[zone]),
          zone === 'grain' && React.createElement('div', {
            style: { fontSize: 11, color: 'var(--c-mid)', marginBottom: 4 }
          }, t.plate.grainSub),
          React.createElement('div', {
            style: { fontSize: 12, color: 'var(--c-light)', marginBottom: 6 }
          }, t.plate.itemsAdded.replace('{n}', items.length).replace('{max}', mx)),
          items.map(it =>

      React.createElement('button', {
        onClick: checkPlate,
        style: { background: 'var(--c-green)', color: '#fff', border: 'none', borderRadius: 10, padding: '12px 24px', fontSize: 16, fontWeight: 700 }
      }, t.plate.checkBtn),
      React.createElement('button', {
        onClick: resetPlate,
        style: { background: '#fff', color: 'var(--c-mid)', border: '2px solid var(--c-divider-light)', borderRadius: 10, padding: '12px 24px', fontSize: 16, fontWeight: 700 }
      }, t.plate.resetBtn)
    )
  );
}

// ═══════════════════════════════════════════════
// FAQ SECTION
// ═══════════════════════════════════════════════
function FAQSection({ t }) {
  const [open, setOpen] = useState(null);
  return React.createElement(Section, { id: 'faq' },
    React.createElement('h2', { style: S.h2 }, t.faq.sectionTitle),
    t.faq.items.map((item, i) =>
      React.createElement('div', {
        key: i,
        style: { ...S.card, cursor: 'pointer', marginBottom: 10, userSelect: 'none' },
        onClick: () => {
          setOpen(open === i ? null : i);
          trackEvent('faq_toggle', { question_index: i, action: open === i ? 'close' : 'open' });
        }
      },
        React.createElement('div', {
          style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center' }
        },
          React.createElement('h3', { style: { ...S.h3, marginBottom: 0, fontSize: 17, flex: 1 } }, item.q),
          React.createElement('span', {
            style: { fontSize: 20, color: 'var(--c-mid)', transform: open === i ? 'rotate(180deg)' : 'rotate(0)', transition: 'transform 0.2s', flexShrink: 0, marginLeft: 8 }
          }, '▾')
        ),
        open === i && React.createElement('p', {
          style: { ...S.p, marginTop: 10, marginBottom: 0, paddingTop: 10, borderTop: '1px solid #eee' }
        }, item.a)
      )
    )
  );
}

// ═══════════════════════════════════════════════
// FOOTER
// ═══════════════════════════════════════════════
function Footer({ t }) {
  const year = new Date().getFullYear();
  return React.createElement('footer', {
    style: { background: '#3e352d', color: '#e8e2db', padding: '36px 20px' }
  },
    React.createElement('div', { style: { maxWidth: 'var(--max-w)', margin: '0 auto' } },
      React.createElement('h3', {
        style: { fontFamily: 'var(--font-heading)', fontSize: 18, fontWeight: 700, color: '#fff', marginBottom: 14 }
      }, t.footer.resourcesTitle),
      t.footer.resources.map((r, i) =>
        React.createElement('a', {
          key: i, href: r.url, target: '_blank', rel: 'noopener',
          style: { display: 'block', color: '#90caf9', fontSize: 15, marginBottom: 8, textDecoration: 'none' },
          onClick: () => trackEvent('resource_click', { resource_name: r.name })
        }, '🔗 ', r.name)
      ),
      React.createElement('hr', { style: { border: 'none', borderTop: '1px solid #5a5047', margin: '20px 0' } }),
      React.createElement('p', { style: { fontSize: 14, color: '#c4bdb5', lineHeight: 1.6, marginBottom: 10 } }, t.footer.disclaimer),
      React.createElement('p', { style: { fontSize: 14, color: '#c4bdb5', lineHeight: 1.6, marginBottom: 10 } }, t.footer.contact),
      React.createElement('p', { style: { fontSize: 13, color: '#8a7f73' } }, t.footer.copyright.replace('{year}', year))
    )
  );
}

// ═══════════════════════════════════════════════
// APP ROOT
// ═══════════════════════════════════════════════
function App() {
  const [lang, setLang] = useState('en');
  const params = getParams();
  const t = T[lang];

  // Set html lang attribute
  useEffect(() => {
    document.documentElement.lang = lang === 'zh' ? 'zh-Hans' : 'en';
  }, [lang]);

  return React.createElement(React.Fragment, null,
    React.createElement(NavBar, { lang, setLang, t, params }),
    React.createElement(WelcomeBanner, { t, params }),
    React.createElement(GenesSection, { t }),
    React.createElement(RiskResultsSection, { t, params }),
    React.createElement(ActionSection, { t, params }),
    React.createElement(NumbersSection, { t }),
    React.createElement(PlateSection, { t, lang }),
    React.createElement(FAQSection, { t }),
    React.createElement(Footer, { t })
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
