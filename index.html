    if(isDM&&hiRel)return"基因风险加上糖尿病，意味着现在行动特别重要。以下是适合新加坡生活的实用方法。";
    if(isDM&&!hiRel)return"虽然基因风险一般，但糖尿病本身会增加心脏病风险。现在改变生活习惯——配合吃药——很重要。";

    if(hiRel&&absLevel==="intermediate")return"基因风险和检查数字都显示现在改变很重要。以下是实用的开始方法。";
    if(hiRel&&absLevel==="normal")return"基因风险比较高，但目前健康检查数字还可以。现在养成好习惯很值得。";
    if(!hiRel&&absLevel==="high")return"基因对您有利，但检查数字偏高。跟医生合作，改变生活习惯很重要。";
    if(!hiRel&&absLevel==="intermediate")return"基因风险一般，但检查数字有改善空间。现在的小改变可以帮助您保持健康。";
    return"以下是保持心脏健康的实用方法，适合新加坡的生活方式。";
  }
  if(isDM&&hiRel)return"Your genetic chance and diabetes together mean that acting now is especially important. Here are practical steps that work in Singapore.";
  if(isDM&&!hiRel)return"While your genetic chance is average, diabetes adds cardiovascular risk on its own. Making lifestyle changes now — alongside your medication — is important.";
  if(hiRel&&absLevel==="high")return"Your results show that acting now is especially important. Work closely with your doctor and commit to these practical steps.";
  if(hiRel&&absLevel==="intermediate")return"Both your genetic chance and clinical factors suggest that making changes now matters. Here are practical steps to get started.";
  if(hiRel&&absLevel==="normal")return"Your genetic chance is higher, but your clinical picture is currently manageable. Building strong habits now is worthwhile.";
  if(!hiRel&&absLevel==="high")return"Your genes are on your side, but your clinical risk is elevated. Working with your doctor and making lifestyle changes now is important.";
  if(!hiRel&&absLevel==="intermediate")return"Your genetic chance is average, but your clinical factors suggest room for improvement. Small changes now can help keep you on track.";
  return"Here are practical steps to maintain your heart health, with tips that work in Singapore.";
}

function showMed(m){return m.absLevel==="intermediate"||m.absLevel==="high"||m.isDM;}
function showStrong(m){return m.absLevel==="high"||(m.isDM&&m.hiRel);}

function PlateSection({lang}){
  const L=lang==='zh';
  const FOODS=L?FOODS_ZH:FOODS_EN;
  const MOD_NOTE=L?MOD_ZH:MOD_EN;
  const [filter,setFilter]=useState("all");const [plate,setPlate]=useState({veg:[],grain:[],protein:[]});const [sel,setSel]=useState(null);const [fb,setFb]=useState(null);const [history,setHistory]=useState([]);
  const max={veg:4,grain:2,protein:2};const zc={veg:"#2e7d32",grain:"#f57f17",protein:"#7b1fa2"};
  const zl=L?{veg:"蔬菜水果",grain:"饭面面包",protein:"蛋白质、肉类和其他"}:{veg:"Fruit & Veg",grain:"Rice, Noodles & Bread",protein:"Protein, Meat and Others"};
  const filtered=FOODS.filter(f=>filter==="all"?true:(f.cuisine===filter||f.cuisine==="all"));
  const used=new Set([...Object.values(plate).flat().map(i=>i.id),...history.filter(h=>!h.ok).map(h=>h.item.id)]);
  function tapItem(item){if(sel&&sel.id===item.id){setSel(null);setFb(null);return;}setSel(item);setFb(null);ga('plate_tap',{item:item.id});}
  function tapZone(zone){
    if(!sel){setFb({type:"info",content:L?"👆 第一步：先从上面选一个食物。":"👆 Step 1 first: select a food item above."});return;}
    if(sel.zone==="avoid"){setFb({type:"avoid",name:sel.name,reason:sel.reason,alt:sel.alt});setHistory(h=>[...h,{item:sel,ok:false}]);setSel(null);ga('plate_avoid',{item:sel.id});return;}
    if(sel.zone!==zone){setFb({type:"wrong",content:L?`"${sel.name}" 应该放在 ${zl[sel.zone]}——请点那个部分。`:`"${sel.name}" belongs in ${zl[sel.zone]} — tap that section instead.`});return;}
    if(plate[zone].length>=max[zone]){setFb({type:"info",content:L?`这个部分满了（最多${max[zone]}个）。`:`That section is full (max ${max[zone]} items).`});setSel(null);return;}
    if(plate[zone].find(i=>i.id===sel.id)){setFb({type:"info",content:L?"已经在餐盘上了。":"Already on your plate."});setSel(null);return;}
    setPlate({...plate,[zone]:[...plate[zone],sel]});setHistory(h=>[...h,{item:sel,ok:true}]);setFb({type:"good",content:`"${sel.name}" — ${sel.desc.toLowerCase()}.`});setSel(null);ga('plate_placed',{item:sel.id,zone});
  }
  function check(){const t=plate.veg.length+plate.grain.length+plate.protein.length;if(!t){setFb({type:"info",content:L?"餐盘是空的——从第一步开始！":"Your plate is empty — start with Step 1!"});return;}const ok=plate.veg.length>=2&&plate.grain.length>=1&&plate.protein.length>=1;if(ok){const w=history.filter(h=>!h.ok).length;const r=history.filter(h=>h.ok).length;setFb({type:"done",content:L?`${r}个健康选择已放好${w?`，${w}个不健康选择已发现`:""}。`:`${r} healthy choice${r>1?"s":""} placed${w?`, ${w} incorrect selection${w>1?"s":""}`:""}.`});}else{let n=[];if(plate.veg.length<2)n.push(L?"更多蔬菜水果":"more fruit & veg");if(!plate.grain.length)n.push(L?"饭面或面包":"rice, noodles or bread");if(!plate.protein.length)n.push(L?"肉类或蛋白质":"meat or protein");setFb({type:"almost",content:L?`快好了——再加${n.join("、")}。`:`Almost there — add ${n.join(", ")}.`});}}
  function reset(){setPlate({veg:[],grain:[],protein:[]});setFb(null);setSel(null);setHistory([]);}
  function renderFb(){if(!fb)return null;if(fb.type==="good")return (<div style={{background:"#e8f5e9",borderRadius:10,padding:"12px 16px",fontSize:15,color:S.body,lineHeight:1.6,fontWeight:600,maxWidth:500,margin:"0 auto 12px"}}>✅ <span style={{color:S.g,fontWeight:800}}>{fb.content}</span></div>);if(fb.type==="done")return (<div style={{background:"#e8f5e9",borderRadius:10,padding:"12px 16px",fontSize:15,color:S.body,lineHeight:1.6,fontWeight:600,maxWidth:500,margin:"0 auto 12px"}}>🎉 <span style={{color:S.g,fontWeight:800}}>{L?"做得好！":"Well done!"}</span> {fb.content}</div>);if(fb.type==="almost")return (<div style={{background:S.obg,borderRadius:10,padding:"12px 16px",fontSize:15,color:S.body,lineHeight:1.6,fontWeight:600,maxWidth:500,margin:"0 auto 12px"}}>🔄 {fb.content}</div>);if(fb.type==="avoid")return (<div style={{background:"#fff8e1",borderRadius:10,padding:"14px 16px",fontSize:15,color:S.body,lineHeight:1.7,maxWidth:500,margin:"0 auto 12px",textAlign:"left"}}><div style={{marginBottom:6}}><span style={{fontWeight:800,color:S.o}}>"{fb.name}"</span> {L?"通常不算健康餐盘的好选择，因为它":"is generally not a healthy-plate option, because it is"} <span style={{fontWeight:700,color:S.r,textDecoration:"underline"}}>{fb.reason}</span>.</div><div style={{marginBottom:8}}>{L?"如果可以，试试":"If possible, try"} <span style={{fontWeight:700,color:S.g}}>{fb.alt}</span> {L?"代替。":"instead."}</div><div style={{fontSize:14,color:S.mid,fontStyle:"italic",borderTop:"1px solid #eee",paddingTop:8}}>💡 {MOD_NOTE}</div></div>);if(fb.type==="wrong")return (<div style={{background:S.obg,borderRadius:10,padding:"12px 16px",fontSize:15,color:S.body,lineHeight:1.6,fontWeight:600,maxWidth:500,margin:"0 auto 12px"}}>{fb.content}</div>);return (<div style={{background:"#f5f5f5",borderRadius:10,padding:"12px 16px",fontSize:15,color:S.body,lineHeight:1.6,fontWeight:600,maxWidth:500,margin:"0 auto 12px"}}>{fb.content}</div>);}

  const R=100,oR=R+8,pcx=280,pcy=215,svgW=560,svgH=430;
  function arc(sa,ea,color,zone){const sr=sa*Math.PI/180,er=ea*Math.PI/180;const x1=pcx+R*Math.cos(sr),y1=pcy+R*Math.sin(sr),x2=pcx+R*Math.cos(er),y2=pcy+R*Math.sin(er);return (<path d={`M${pcx},${pcy}L${x1},${y1}A${R},${R},0,${ea-sa>180?1:0},1,${x2},${y2}Z`} fill="#f0ece5" stroke={color} strokeWidth="3" onClick={()=>tapZone(zone)} style={{cursor:"pointer"}}/>);}
  const gAng=210,vAng=330,pAng=130;
  const gEX=pcx+oR*Math.cos(gAng*Math.PI/180),gEY=pcy+oR*Math.sin(gAng*Math.PI/180);
  const vEX=pcx+oR*Math.cos(vAng*Math.PI/180),vEY=pcy+oR*Math.sin(vAng*Math.PI/180);
  const pEX=pcx+oR*Math.cos(pAng*Math.PI/180),pEY=pcy+oR*Math.sin(pAng*Math.PI/180);
  const gBox={x:0,y:18,w:215,h:88};const vBox={x:350,y:8,w:208,h:70};const pBox={x:0,y:340,w:230,h:70};
  const gAnc={x:gBox.x+gBox.w/2,y:gBox.y+gBox.h};const vAnc={x:vBox.x+vBox.w/2,y:vBox.y+vBox.h};const pAnc={x:pBox.x+pBox.w/2,y:pBox.y};
  const hdrH=72;

  return (
    <Wrap id="plate">
      <Head title={L?"组建健康餐盘":"Build a Healthy Plate"} icon="🍽️"/>
      <div style={{fontSize:20,fontWeight:900,color:S.body,marginBottom:10}}>{L?"🍽️ 我的健康餐盘":"🍽️ My Healthy Plate"}</div>
      <p style={{fontSize:16,fontWeight:700,color:S.mid,marginBottom:10}}>{L?"📺 点下面看实用视频：":"📺 Click below to watch these helpful videos:"}</p>
      <div className="video-row" style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap",marginBottom:18,maxWidth:480,margin:"0 auto 18px"}}><a href="https://www.youtube.com/watch?v=2w4Ssp_oyRA" target="_blank" rel="noopener noreferrer" style={{textDecoration:"none",flex:1,minWidth:180}} onClick={()=>ga('video',{v:'plate'})}><div style={{background:"linear-gradient(135deg,#e8f5e9,#c8e6c9)",border:"2px solid #66bb6a",borderRadius:12,padding:"12px 14px",display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:28,flexShrink:0}}>🎬</span><span style={{fontSize:15,fontWeight:800,color:"#2e7d32",lineHeight:1.3}}>{L?"什么是健康餐盘？":"What is My Healthy Plate?"}</span></div></a><a href="https://www.youtube.com/watch?v=CmzlNGbiGiQ" target="_blank" rel="noopener noreferrer" style={{textDecoration:"none",flex:1,minWidth:180}} onClick={()=>ga('video',{v:'10ideas'})}><div style={{background:"linear-gradient(135deg,#fff3e0,#ffe0b2)",border:"2px solid #ffa726",borderRadius:12,padding:"12px 14px",display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:28,flexShrink:0}}>🎬</span><span style={{fontSize:15,fontWeight:800,color:"#e65100",lineHeight:1.3}}>{L?"10个健康餐盘点子":"10 Healthy Plate Ideas"}</span></div></a></div>
      <p style={{fontSize:16,color:S.sub,lineHeight:1.65,maxWidth:460,margin:"0 auto 10px"}}>{L?"练习组建均衡的一餐。你能看出哪些是健康的选择吗？":"Practise building a balanced meal. Can you spot the healthy choices?"}</p>
      <div style={{background:S.gbg,borderRadius:12,padding:"14px 18px",fontSize:16,color:S.body,lineHeight:1.7,textAlign:"left",maxWidth:440,margin:"0 auto 20px"}}>{L?<><strong>第一步：</strong>从下面选一个食物。<br/><strong>第二步：</strong>点餐盘下面的方框（或直接点餐盘）来放食物。<br/><strong>第三步：</strong>看反馈——告诉你选的对不对，该放哪里，为什么。<br/><span style={{color:S.mid,fontSize:14}}>不是所有食物都适合健康餐盘——你会知道为什么。再点一次已选的食物可以取消。</span></>:<><strong>Step 1:</strong> Select a food item from the list below.<br/><strong>Step 2:</strong> Tap a category box below the plate (or directly on the plate) to place it there.<br/><strong>Step 3:</strong> Check the feedback — it will tell you if your choice is healthy, where it belongs, and why.<br/><span style={{color:S.mid,fontSize:14}}>Not all items belong on a healthy plate — you'll learn why. Tap a selected item again to deselect it.</span></>}</div>
      <div className="food-grid" style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8,maxWidth:500,margin:"0 auto 16px"}}>{filtered.map(item=>{const isSel=sel?.id===item.id;const isDone=used.has(item.id);return (<button key={item.id} onClick={()=>!isDone&&tapItem(item)} style={{padding:"10px 4px",border:isSel?`2.5px solid ${S.g}`:"1.5px solid #ccc",borderRadius:12,background:isSel?S.gbg:isDone?"#ece9e4":"#fff",cursor:isDone?"default":"pointer",opacity:isDone?0.5:1,display:"flex",flexDirection:"column",alignItems:"center",textAlign:"center",minHeight:82}}><span style={{fontSize:30,marginBottom:3}}>{item.emoji}</span><span style={{fontSize:12,fontWeight:700,color:isDone?"#aaa":S.body,lineHeight:1.3}}>{item.name}</span><span style={{fontSize:10,color:isDone?"#bbb":S.mid,lineHeight:1.2,marginTop:2}}>{item.desc}</span></button>);})}</div>
      <div style={{marginBottom:6,fontSize:13,color:S.mid,fontWeight:600}}>{L?"按食物类型筛选：":"Filter by ethnic food type:"}</div>
      <div style={{display:"flex",gap:6,marginBottom:18,flexWrap:"wrap",justifyContent:"center"}}>{[["all",L?"全部":"All"],["chinese",L?"中式":"Chinese"],["malay",L?"马来式":"Malay"],["indian",L?"印度式":"Indian"]].map(([k,l])=>(<button key={k} onClick={()=>setFilter(k)} style={{padding:"7px 16px",border:`1.5px solid ${filter===k?S.g:"#bbb"}`,borderRadius:18,background:filter===k?S.g:"#fff",color:filter===k?"#fff":S.sub,fontSize:14,fontWeight:700,cursor:"pointer"}}>{l}</button>))}</div>

      {/* Plate SVG */}
      <div className="plate-svg-wrap" style={{margin:"0 auto 10px",maxWidth:560}}>
        <svg viewBox={`0 0 ${svgW} ${svgH}`} style={{width:"100%"}}>
          <circle cx={pcx} cy={pcy} r={oR} fill="none" stroke={S.div} strokeWidth="3"/>
          {arc(270,90,zc.veg,"veg")}
          {arc(90,180,zc.protein,"protein")}
          {arc(180,270,zc.grain,"grain")}
          {/* Labels — hidden on mobile via CSS */}
          <g className="plate-svg-labels">
          <line x1={gAnc.x} y1={gAnc.y} x2={gEX} y2={gEY} stroke={zc.grain} strokeWidth="2" strokeDasharray="5,4"/>
          <line x1={vAnc.x} y1={vAnc.y} x2={vEX} y2={vEY} stroke={zc.veg} strokeWidth="2" strokeDasharray="5,4"/>
          <line x1={pAnc.x} y1={pAnc.y} x2={pEX} y2={pEY} stroke={zc.protein} strokeWidth="2" strokeDasharray="5,4"/>
          <rect x={gBox.x} y={gBox.y} width={gBox.w} height={gBox.h} rx={12} fill="#fff" stroke={zc.grain} strokeWidth="2.5" onClick={()=>tapZone("grain")} style={{cursor:"pointer"}}/>
          <text x={gBox.x+gBox.w/2} y={gBox.y+24} textAnchor="middle" fontSize="16" fontWeight="900" fill={zc.grain} fontFamily={S.h}>{L?"¼ 饭、面、面包":"¼ Rice, Noodles & Bread"}</text>
          <text x={gBox.x+gBox.w/2} y={gBox.y+44} textAnchor="middle" fontSize="13" fontWeight="700" fill={zc.grain} fontFamily={S.f}>{L?"（尽量选全谷类）":"(wholegrains when possible)"}</text>
          <text x={gBox.x+gBox.w/2} y={gBox.y+66} textAnchor="middle" fontSize="14" fontWeight="700" fill={S.mid} fontFamily={S.f}>{plate.grain.length} of {max.grain} items</text>
          <rect x={vBox.x} y={vBox.y} width={vBox.w} height={vBox.h} rx={12} fill="#fff" stroke={zc.veg} strokeWidth="2.5" onClick={()=>tapZone("veg")} style={{cursor:"pointer"}}/>
          <text x={vBox.x+vBox.w/2} y={vBox.y+28} textAnchor="middle" fontSize="18" fontWeight="900" fill={zc.veg} fontFamily={S.h}>{L?"½ 蔬菜水果":"½ Fruit & Veg"}</text>
          <text x={vBox.x+vBox.w/2} y={vBox.y+52} textAnchor="middle" fontSize="14" fontWeight="700" fill={S.mid} fontFamily={S.f}>{plate.veg.length} of {max.veg} items</text>
          <rect x={pBox.x} y={pBox.y} width={pBox.w} height={pBox.h} rx={12} fill="#fff" stroke={zc.protein} strokeWidth="2.5" onClick={()=>tapZone("protein")} style={{cursor:"pointer"}}/>
          <text x={pBox.x+pBox.w/2} y={pBox.y+28} textAnchor="middle" fontSize="16" fontWeight="900" fill={zc.protein} fontFamily={S.h}>{L?"¼ 蛋白质、肉类":"¼ Protein, Meat and Others"}</text>
          <text x={pBox.x+pBox.w/2} y={pBox.y+52} textAnchor="middle" fontSize="14" fontWeight="700" fill={S.mid} fontFamily={S.f}>{plate.protein.length} of {max.protein} items</text>
          </g>
        </svg>
      </div>

      {/* Category boxes below plate */}
      <div className="plate-boxes" style={{display:"grid",gridTemplateColumns:"4fr 3fr 4fr",gap:10,maxWidth:560,margin:"0 auto 14px",alignItems:"start"}}>
        <div onClick={()=>tapZone("grain")} style={{cursor:"pointer"}}>
          <div style={{height:hdrH,display:"flex",flexDirection:"column",justifyContent:"flex-end",paddingBottom:4}}>
            <div style={{fontSize:16,fontWeight:900,color:zc.grain,fontFamily:S.h}}>{L?"¼ 饭、面、面包":"¼ Rice, Noodles & Bread"}</div>
            <div style={{fontSize:12,fontWeight:600,color:zc.grain,fontStyle:"italic"}}>{L?"（尽量选全谷类）":"(wholegrains when possible)"}</div>
            <div style={{fontSize:14,fontWeight:700,color:S.mid}}>{plate.grain.length} of {max.grain} {L?"已加":"items added"}</div>
          </div>
          <div style={{border:`2px solid ${zc.grain}50`,borderRadius:12,minHeight:56,padding:"8px 6px",display:"flex",flexWrap:"wrap",gap:4,background:"#fff",justifyContent:"center",alignContent:"flex-start"}}>
            {plate.grain.length===0&&<span style={{fontSize:13,color:"#bbb",fontStyle:"italic",padding:"10px 0"}}>{L?"点击添加":"Tap to add"}</span>}
            {plate.grain.map(it=>(<span key={it.id} style={{background:zc.grain+"12",border:`1.5px solid ${zc.grain}40`,borderRadius:8,padding:"5px 10px",fontSize:12,fontWeight:700,color:S.body,whiteSpace:"nowrap"}}>{it.emoji} {it.name}</span>))}
          </div>
        </div>
        <div onClick={()=>tapZone("veg")} style={{cursor:"pointer"}}>
          <div style={{height:hdrH,display:"flex",flexDirection:"column",justifyContent:"flex-end",paddingBottom:4}}>
            <div style={{fontSize:17,fontWeight:900,color:zc.veg,fontFamily:S.h}}>{L?"½ 蔬菜水果":"½ Fruit & Veg"}</div>
            <div style={{fontSize:14,fontWeight:700,color:S.mid}}>{plate.veg.length} of {max.veg} {L?"已加":"items added"}</div>
          </div>
          <div style={{border:`2px solid ${zc.veg}50`,borderRadius:12,minHeight:56,padding:"8px 6px",display:"flex",flexWrap:"wrap",gap:4,background:"#fff",justifyContent:"center",alignContent:"flex-start"}}>
            {plate.veg.length===0&&<span style={{fontSize:13,color:"#bbb",fontStyle:"italic",padding:"10px 0"}}>{L?"点击添加":"Tap to add"}</span>}
            {plate.veg.map(it=>(<span key={it.id} style={{background:zc.veg+"12",border:`1.5px solid ${zc.veg}40`,borderRadius:8,padding:"5px 10px",fontSize:12,fontWeight:700,color:S.body,whiteSpace:"nowrap"}}>{it.emoji} {it.name}</span>))}
          </div>
        </div>
        <div onClick={()=>tapZone("protein")} style={{cursor:"pointer"}}>
          <div style={{height:hdrH,display:"flex",flexDirection:"column",justifyContent:"flex-end",paddingBottom:4}}>
            <div style={{fontSize:15,fontWeight:900,color:zc.protein,fontFamily:S.h}}>{L?"¼ 蛋白质、肉类":"¼ Protein, Meat and Others"}</div>
            <div style={{fontSize:14,fontWeight:700,color:S.mid}}>{plate.protein.length} of {max.protein} {L?"已加":"items added"}</div>
          </div>
          <div style={{border:`2px solid ${zc.protein}50`,borderRadius:12,minHeight:56,padding:"8px 6px",display:"flex",flexWrap:"wrap",gap:4,background:"#fff",justifyContent:"center",alignContent:"flex-start"}}>
            {plate.protein.length===0&&<span style={{fontSize:13,color:"#bbb",fontStyle:"italic",padding:"10px 0"}}>{L?"点击添加":"Tap to add"}</span>}
            {plate.protein.map(it=>(<span key={it.id} style={{background:zc.protein+"12",border:`1.5px solid ${zc.protein}40`,borderRadius:8,padding:"5px 10px",fontSize:12,fontWeight:700,color:S.body,whiteSpace:"nowrap"}}>{it.emoji} {it.name}</span>))}
          </div>
        </div>
      </div>
      {renderFb()}
      {history.length>0&&<div style={{marginBottom:12,fontSize:14,color:S.mid}}>{L?"得分：":"Score: "}<span style={{color:"#2e7d32",fontWeight:800}}>✓ {history.filter(h=>h.ok).length} {L?"正确":"correct"}</span>{history.some(h=>!h.ok)&&<>{" · "}<span style={{color:S.r,fontWeight:800}}>✗ {history.filter(h=>!h.ok).length} {L?"不正确":"incorrect"}</span></>}</div>}
      <div style={{display:"flex",gap:8,justifyContent:"center",maxWidth:380,margin:"0 auto"}}><button onClick={()=>{check();ga('plate_check');}} style={{flex:1,padding:"13px",border:"none",borderRadius:10,background:S.g,color:"#fff",fontSize:16,fontWeight:800,cursor:"pointer"}}>{L?"✅ 检查我的餐盘":"✅ Check my plate"}</button><button onClick={reset} style={{padding:"13px 18px",border:`2px solid ${S.div}`,borderRadius:10,background:"#fff",color:S.sub,fontSize:16,fontWeight:700,cursor:"pointer"}}>{L?"🔄 重新来":"🔄 Start over"}</button></div>
    </Wrap>
  );
}

function FAQ({lang}){
  const L=lang==='zh';
  const[open,setOpen]=useState(null);
  const learnMore_en=(<div style={{textAlign:"left",maxWidth:460,margin:"0 auto"}}><p style={{marginBottom:14}}>Here are some useful resources:</p><div style={{marginBottom:10}}><strong>General health information:</strong></div><Res href="https://hpb.gov.sg" name="Health Promotion Board" desc="Singapore's national agency for health promotion — diet, exercise, and wellness resources."/><Res href="https://www.healthhub.sg/programmes/heart-health" name="HealthHub — Heart Health" desc="Heart health programmes, articles, and tools from Singapore's health portal."/><Res href="https://activesg.gov.sg/home" name="ActiveSG" desc="Free and affordable sports facilities, fitness programmes, and community activities across Singapore."/><div style={{marginTop:18,marginBottom:10}}><strong>CVD-related information:</strong></div><Res href="https://www.myheart.org.sg" name="Singapore Heart Foundation" desc="Patient resources on heart disease prevention, symptoms, and living with heart conditions."/><Res href="https://www.nhcs.com.sg" name="National Heart Centre Singapore" desc="Singapore's specialist heart centre — patient education on heart conditions and treatments."/><Res href="https://www.ace-hta.gov.sg/healthcare-professionals/ace-repository-for-clinical-guidelines/" name="ACE Clinical Guidelines" desc="Evidence-based clinical guidelines from Singapore's Agency for Care Effectiveness."/><div style={{marginTop:18,marginBottom:10}}><strong>Precision medicine:</strong></div><Res href="https://www.npm.sg" name="PRECISE — National Precision Medicine" desc="Singapore's national programme using genomic data to improve health outcomes for the local population."/></div>);
  const learnMore_zh=(<div style={{textAlign:"left",maxWidth:460,margin:"0 auto"}}><p style={{marginBottom:14}}>以下是一些有用的资源：</p><div style={{marginBottom:10}}><strong>一般健康信息：</strong></div><Res href="https://hpb.gov.sg" name="健康促进局" desc="新加坡健康促进国家机构——饮食、运动和健康资源。"/><Res href="https://www.healthhub.sg/programmes/heart-health" name="HealthHub — 心脏健康" desc="新加坡健康网站的心脏健康项目、文章和工具。"/><Res href="https://activesg.gov.sg/home" name="ActiveSG" desc="全新加坡免费和便宜的运动设施、健身活动。"/><div style={{marginTop:18,marginBottom:10}}><strong>心脏病相关信息：</strong></div><Res href="https://www.myheart.org.sg" name="新加坡心脏基金会" desc="心脏病预防、症状和护理的资源。"/><Res href="https://www.nhcs.com.sg" name="国家心脏中心" desc="新加坡心脏专科中心——心脏疾病的知识。"/><Res href="https://www.ace-hta.gov.sg/healthcare-professionals/ace-repository-for-clinical-guidelines/" name="ACE 临床指南" desc="新加坡护理效能机构的医疗指南。"/><div style={{marginTop:18,marginBottom:10}}><strong>精准医学：</strong></div><Res href="https://www.npm.sg" name="PRECISE — 国家精准医学计划" desc="新加坡利用基因数据改善本地人健康的国家项目。"/></div>);
  const items=L?[
    {q:"我能改变基因风险吗？",a:"不能——基因不会变。但您可以通过饮食、运动、吃药和健康习惯来降低整体心脏病风险。很多基因风险高的人因为管好了其他方面，从来没有得心脏病。"},
    {q:"家人应该去检测吗？",a:"心脏病风险可以遗传。如果您的基因风险比较高，您的家人也可以跟医生讨论要不要做基因检测。不管怎样，健康的生活习惯对家人都有好处。"},
    {q:"这些评分准确吗？",a:(<>多基因风险评分是根据目前的科学研究算出来的——它能看到基因风险的一大部分，但不是全部。医生会把它和您的整体健康情况一起考虑。<br/><br/>10年临床风险评分（SG-FRS-2023）是根据已知的风险因素算的，已经针对新加坡人群调整过了。跟基因评分不一样，这个数字会随着健康指标改善而变化。</>)},
    {q:"我该怎样跟医生配合？",a:"您的多基因风险评分结果已经在看诊时跟您说过了。今后请跟医生一起定个人健康目标——血压、胆固醇、血糖和体重——定期复诊时检查进展。问问医生哪些生活改变对您最有帮助。"},
    {q:"在哪里可以了解更多？",a:learnMore_zh}
  ]:[
    {q:"Can I change my genetic risk?",a:"No — your genes don't change. But you can lower your overall heart disease risk through diet, exercise, medication, and healthy habits. Many people with higher genetic risk never develop heart disease because they manage other risk factors well."},
    {q:"Should my family members get tested?",a:"Heart disease risk can run in families. If you have a higher genetic risk, it may be worth discussing genetic testing with your family members' doctors. Family members benefit from healthy lifestyle changes regardless."},
    {q:"How accurate are these scores?",a:(<>The polygenic risk score is an estimate based on current science — it captures a meaningful portion of genetic risk but not all of it. Your doctor considers it alongside your full health picture.<br/><br/>The 10-year clinical risk score (SG-FRS-2023) is based on established risk factors and has been adapted for the Singapore population. Unlike the genetic score, this number can change as your health indicators improve.</>)},
    {q:"How should I work with my doctor on this?",a:"Your PRS results have already been shared with you during consultation. Going forward, work closely with your doctor to set personal health targets — for blood pressure, cholesterol, blood sugar, and weight — and review your progress at regular follow-ups. Ask about what lifestyle changes would make the biggest difference for your specific situation."},
    {q:"Where can I learn more?",a:learnMore_en}
  ];
  return (<Wrap id="faq"><Head title={L?"常见问题":"Commonly Asked Questions"} icon="❓" suffix={L?"":"(FAQs)"}/>{items.map((it,i)=>(<div key={i} style={{border:`1.5px solid ${S.div}`,borderRadius:12,marginBottom:10,overflow:"hidden"}}><button onClick={()=>{setOpen(open===i?null:i);ga('faq',{q:i});}} style={{width:"100%",padding:"16px 18px",border:"none",background:open===i?S.gbg:"#fff",textAlign:"center",fontSize:17,fontWeight:800,color:S.body,cursor:"pointer",display:"flex",justifyContent:"center",alignItems:"center",gap:8,fontFamily:S.f}}><span style={{flex:1,textAlign:"center"}}>{it.q}</span><span style={{fontSize:22,color:S.g,fontWeight:900,transform:open===i?"rotate(45deg)":"none",transition:"0.2s",flexShrink:0}}>+</span></button>{open===i&&<div style={{padding:"6px 18px 16px",fontSize:16,color:S.sub,lineHeight:1.7,textAlign:"center"}}>{it.a}</div>}</div>))}</Wrap>);
}
