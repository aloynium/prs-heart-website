oping heart disease","Your clinical health indicators are currently in a reasonable range","Building strong habits now helps keep your clinical health on track"],badgeBg:"#fff8e1",badgeColor:S.o,bg:"linear-gradient(135deg,#fff8f0,#ffe8d0)",headColor:S.o,badge:"🎯 Your clinical health is reasonable — let's build habits to keep it there."};if(!hiRel&&absLevel==="high")return{heading:"Taking Steps for Your Heart",points:["Your genes show an average chance of developing heart disease","However, your clinical health indicators are elevated","Working closely with your doctor and making lifestyle changes now is important"],badgeBg:"#fff0e8",badgeColor:S.o,bg:"linear-gradient(135deg,#fff8f0,#ffe8d0)",headColor:S.o,badge:"📋 Your genes are on your side — now let's focus on improving your clinical health."};if(!hiRel&&absLevel==="intermediate")return{heading:"Strengthening Your Heart Health",points:["Your genes show an average chance of developing heart disease","Your clinical factors suggest there is some room for improvement","Small changes now can help keep you on track"],badgeBg:"#e8f0ff",badgeColor:S.bl,bg:"linear-gradient(135deg,#f0f5ff,#dce8f8)",headColor:S.bl,badge:"📋 Your genetic chance is average — focus on improving your clinical health factors."};return{heading:"Keeping Your Heart Healthy",points:["Your genes show an average chance of developing heart disease","Your clinical health indicators show a positive picture","Maintaining your healthy habits will help keep it that way"],badgeBg:"#dff0e8",badgeColor:S.g,bg:"linear-gradient(135deg,#e6f7f2,#c8ede0)",headColor:S.g,badge:"✨ You're in a good position — keep building on your healthy habits."};}

function Genes(){const cards=[{t:"What are genes?",emoji:"🧬",bg:"#f3ecfa",content:(<>Genes are <span style={{color:HL.purple,fontWeight:800}}>instructions inside your body's cells</span> that determine how your body grows and works. You inherit them from your <span style={{color:HL.purple,fontWeight:800}}>parents</span> — they influence everything from your eye colour to your health.</>)},{t:"What is DNA?",emoji:"📖",bg:S.blbg,content:(<>DNA is the material that <span style={{color:HL.blue,fontWeight:800}}>carries your genes</span>. Think of it as a long instruction manual written in "letters." <span style={{color:HL.blue,fontWeight:800}}>Small differences</span> in these letters make each person unique.</>)},{t:"How are genes linked to diseases?",emoji:"🔗",bg:S.obg,content:(<>Some gene differences can slightly raise or lower your chance of developing health conditions like <span style={{color:HL.orange,fontWeight:800}}>heart disease, diabetes, or stroke</span>. No single gene causes these conditions — it's the <span style={{color:HL.orange,fontWeight:800}}>combined effect of many small differences</span> across thousands of genes.</>)},{t:"What is a Polygenic Risk Score?",emoji:"📊",bg:S.gbg,content:(<>Scientists look at <span style={{color:HL.green,fontWeight:800}}>thousands of these small gene differences</span> together and calculate one score. Your percentile compares your genetic profile to a <span style={{color:HL.green,fontWeight:800}}>Singapore reference population</span> (the SG10K cohort), showing your relative chance of developing heart disease.</>)}];return (<Wrap id="genes"><Head title="How Genes Affect Heart Health" icon="🧬"/>{cards.map((c,i)=>(<div key={i} style={{background:c.bg,borderRadius:16,padding:20,marginBottom:12}}><span style={{fontSize:30,display:"block",marginBottom:6}}>{c.emoji}</span><h3 style={{fontFamily:S.h,fontSize:18,fontWeight:800,color:S.body,margin:"0 0 8px"}}>{c.t}</h3><p style={{fontSize:16,color:S.sub,lineHeight:1.7,margin:"0 a 10,padding:"12px 16px",marginBottom:24,fontSize:16,color:S.g,fontWeight:700}}>🩸 Check how meals and activity affect your blood sugar — small changes make a big difference.</div>}<h3 style={{fontFamily:S.h,fontSize:20,fontWeight:900,color:S.bl,margin:"0 0 12px"}}>🏃 Move More — 150 Minutes a Week</h3><div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:24}}><Tip emoji="⏱️" text="10-min blocks — three walks add up"/><Tip emoji="🪜" text="Take stairs for 2–3 floors"/><Tip emoji="🚶" text="Walk to the bus stop or MRT"/><Tip emoji="🌳" text="Walk or jog at a nearby park"/><Tip emoji="🏢" text="Gentle walk around your block or void deck"/><Tip emoji="👫" text="Walk with family after dinner"/></div><h3 style={{fontFamily:S.h,fontSize:20,fontWeight:900,color:S.p,margin:"0 0 12px"}}>😴 Sleep Well — 7 to 9 Hours</h3><div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:24}}><Tip emoji="⏰" text="Same wake-up time daily"/><Tip emoji="📱" text="Night mode after 9 pm"/><Tip emoji="❄️" text="Room cool at 25°C"/><Tip emoji="☕" text="No kopi/teh near bedtime"/></div><h3 style={{fontFamily:S.h,fontSize:20,fontWeight:900,color:S.r,margin:"0 0 12px"}}>🚫 Cut Down or Avoid</h3><div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8}}><Tip emoji="🍟" text="Deep-fried food raises LDL cholesterol"/><Tip emoji="🧂" text="Salty food raises blood pressure"/><Tip emoji="🍬" text="Sugary food and drinks raise blood sugar"/><Tip emoji="🍺" text="Alcohol raises blood pressure"/><Tip emoji="🚬" text="Smoking damages blood vessels"/></div></Wrap>);}
function Numbers(){const[vals,setVals]=useState({hba1c:"",bp:"",ldl:"",egfr:""});const col={good:"#2e7d32",caution:"#e65100",alert:"#b71c1c"};const lab={good:"Within typical target",caution:"Above typical target — discuss with your doctor",alert:"Well above typical target — speak with your doctor soon",invalid:"Please check — this value seems outside the expected range."};const ico={good:"✓",caution:"!",alert:"▲"};const inds=[{k:"hba1c",name:"HbA1c",emoji:"🩸",unit:"%",desc:"Average blood sugar over 2–3 months.",why:"High blood sugar damages blood vessels over time.",src:"Target: <7% (ACE T2DM ACG, May 2023)"},{k:"bp",name:"Blood Pressure",emoji:"💓",unit:"mmHg (systolic)",desc:"Pressure in arteries when heart beats.",why:"High BP forces the heart to work harder.",src:"Target: <130 mmHg (ACE Hypertension ACG, Dec 2023)"},{k:"ldl",name:"LDL Cholesterol",emoji:"🫀",unit:"mmol/L",desc:'"Bad" cholesterol in artery walls.',why:"High LDL narrows arteries, raising heart attack risk.",src:"Target: <2.6 mmol/L (ACE Lipid ACG, Dec 2023)"},{k:"egfr",name:"eGFR (Kidney)",emoji:"🫘",unit:"mL/min/1.73m²",desc:"How well kidneys filter waste.",why:"Poor kidney function increases cardiovascular risk.",src:"Normal: ≥60 (ACE CKD ACG, Oct 2023)"}];return (<Wrap id="numbers"><Head title="Know Your Numbers" icon="🔢"/><p style={{fontSize:16,color:S.sub,lineHeight:1.65,maxWidth:460,margin:"0 auto 6px"}}>Check how your latest health numbers compare to typical targets. <strong>For awareness only</strong> — discuss personal goals with your doctor.</p><p style={{fontSize:14,color:S.mid,marginBottom:20}}>🔒 Values entered are not stored. They disappear when you close this page.</p>{inds.map(ind=>{const st=light(ind.k,vals[ind.k]);return (<div key={ind.k} style={{background:"#fff",border:`1.5px solid ${st&&st!=="invalid"?col[st]+"60":"#ccc"}`,borderRadius:16,padding:"18px 20px",marginBottom:14,maxWidth:460,margin:"0 auto 14px",borderLeft:`5px solid ${st&&st!=="invalid"?col[st]:st==="invalid"?"#999":"#bbb"}`}}><div style={{display:"flex",alignItems:"flex-start",gap:14}}><div style={{flex:1,textAlign:"left"}}><div style={{fontFamily:S.h,fontSize:20,fontWeight:900,color:S.body}}>{ind.name}</div><div style={{fontSize:15,color:S.mid,marginTop:2}}>{ind.desc}</div><p style={{fontSize:15,color:S.sub,margin:"8px 0 12px",lineHeight:1.55}}><strong>Why it matters:</strong> {ind.why}</p><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}><input type="number" step="any" placeholder="Enter value" value={vals[ind.k]} onChange={e=>setVals({...vals,[ind.k]:e.target.value})} style={{padding:"12px 14px",border:"2px solid #999",borderRadius:10,fontSize:18,fontWeight:800,fontFamily:S.f,color:S.body,width:180,background:"#fafaf7",outline:"none"}}/><span style={{fontSize:14,color:S.sub,fontWeight:700}}>{ind.unit}</span></div>{st&&st!=="invalid"&&(<div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 14px",borderRadius:10,background:st==="good"?"#e8f5e9":st==="caution"?S.obg:S.rbg,marginBottom:6}}><span style={{width:26,height:26,borderRadius:st==="good"?"50%":st==="caution"?4:0,background:col[st],color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:900,flexShrink:0,clipPath:st==="alert"?"polygon(50% 0%, 0% 100%, 100% 100%)":"none"}}>{ico[st]}</span><span style={{fontSize:16,color:col[st],fontWeight:800}}>{lab[st]}</span></div>)}{st==="invalid"&&<div style={{padding:"10px 14px",borderRadius:10,background:"#f5f5f5",fontSize:15,color:"#777",fontWeight:600,marginBottom:6}}>⚠️ {lab.invalid}</div>}<p style={{fontSize:12,color:"#888",margin:"4px 0 0"}}>{ind.src}</p></div><span style={{fontSize:44,flexShrink:0,marginTop:4}}>{ind.emoji}</span></div></div>);})}</Wrap>);}

function PlateSection(){
  const [filter,setFilter]=useState("all");const [plate,setPlate]=useState({veg:[],grain:[],protein:[]});const [sel,setSel]=useState(null);const [fb,setFb]=useState(null);const [history,setHistory]=useState([]);
  const max={veg:4,grain:2,protein:2};const zc={veg:"#2e7d32",grain:"#f57f17",protein:"#7b1fa2"};const zl={veg:"Fruit & Veg",grain:"Rice, Noodles & Bread",protein:"Protein, Meat and Others"};
  const filtered=FOODS.filter(f=>filter==="all"?true:(f.cuisine===filter||f.cuisine==="all"));
  const used=new Set([...Object.values(plate).flat().map(i=>i.id),...history.filter(h=>!h.ok).map(h=>h.item.id)]);
  function tapItem(item){if(sel&&sel.id===item.id){setSel(null);setFb(null);return;}setSel(item);setFb(null);}
  function tapZone(zone){if(!sel){setFb({type:"info",content:"👆 Step 1 first: select a food item above."});return;}if(sel.zone==="avoid"){setFb({type:"avoid",name:sel.name,reason:sel.reason,alt:sel.alt});setHistory(h=>[...h,{item:sel,ok:false}]);setSel(null);return;}if(sel.zone!==zone){setFb({type:"wrong",content:`"${sel.name}" belongs in ${zl[sel.zone]} — tap that section instead.`});return;}if(plate[zone].length>=max[zone]){setFb({type:"info",content:`That section is full (max ${max[zone]} items).`});setSel(null);return;}if(plate[zone].find(i=>i.id===sel.id)){setFb({type:"info",content:"Already on your plate."});setSel(null);return;}setPlate({...plate,[zone]:[...plate[zone],sel]});setHistory(h=>[...h,{item:sel,ok:true}]);setFb({type:"good",content:`"${sel.name}" — ${sel.desc.toLowerCase()}.`});setSel(null);}
  function check(){const t=plate.veg.length+plate.grain.length+plate.protein.length;if(!t){setFb({type:"info",content:"Your plate is empty — start with Step 1!"});return;}const ok=plate.veg.length>=2&&plate.grain.length>=1&&plate.protein.length>=1;if(ok){const w=history.filter(h=>!h.ok).length;const r=history.filter(h=>h.ok).length;setFb({type:"done",content:`${r} healthy choice${r>1?"s":""} placed${w?`, ${w} incorrect selection${w>1?"s":""}`:""}.`});}else{let n=[];if(plate.veg.length<2)n.push("more fruit & veg");if(!plate.grain.length)n.push("rice, noodles or bread");if(!plate.protein.length)n.push("meat or protein");setFb({type:"almost",content:`Almost there — add ${n.join(", ")}.`});}}
  function reset(){setPlate({veg:[],grain:[],protein:[]});setFb(null);setSel(null);setHistory([]);}
  function renderFb(){if(!fb)return null;if(fb.type==="good")return (<div style={{background:"#e8f5e9",borderRadius:10,padding:"12px 16px",fontSize:15,color:S.body,lineHeight:1.6,fontWeight:600,maxWidth:500,margin:"0 auto 12px"}}>✅ <span style={{color:S.g,fontWeight:800}}>{fb.content}</span></div>);if(fb.type==="done")return (<div style={{background:"#e8f5e9",borderRadius:10,padding:"12px 16px",fontSize:15,color:S.body,lineHeight:1.6,fontWeight:600,maxWidth:500,margin:"0 auto 12px"}}>🎉 <span style={{color:S.g,fontWeight:800}}>Well done!</span> {fb.content}</div>);if(fb.type==="almost")return (<div style={{background:S.obg,borderRadius:10,padding:"12px 16px",fontSize:15,color:S.body,lineHeight:1.6,fontWeight:600,maxWidth:500,margin:"0 auto 12px"}}>🔄 {fb.content}</div>);if(fb.type==="avoid")return (<div style={{background:"#fff8e1",borderRadius:10,padding:"14px 16px",fontSize:15,color:S.body,lineHeight:1.7,maxWidth:500,margin:"0 auto 12px",textAlign:"left"}}><div style={{marginBottom:6}}><span style={{fontWeight:800,color:S.o}}>"{fb.name}"</span> is generally not a healthy-plate option, because it is <span style={{fontWeight:700,color:S.r,textDecoration:"underline"}}>{fb.reason}</span>.</div><div style={{marginBottom:8}}>If possible, try <span style={{fontWeight:700,color:S.g}}>{fb.alt}</span> instead.</div><div style={{fontSize:14,color:S.mid,fontStyle:"italic",borderTop:"1px solid #eee",paddingTop:8}}>💡 {MOD_NOTE}</div></div>);if(fb.type==="wrong")return (<div style={{background:S.obg,borderRadius:10,padding:"12px 16px",fontSize:15,color:S.body,lineHeight:1.6,fontWeight:600,maxWidth:500,margin:"0 auto 12px"}}>{fb.content}</div>);return (<div style={{background:"#f5f5f5",borderRadius:10,padding:"12px 16px",fontSize:15,color:S.body,lineHeight:1.6,fontWeight:600,maxWidth:500,margin:"0 auto 12px"}}>{fb.content}</div>);}

  // Large centered plate with corner labels + dotted lines
  const R=100,oR=R+8,pcx=280,pcy=215,svgW=560,svgH=430;
  function arc(sa,ea,color,zone){const sr=sa*Math.PI/180,er=ea*Math.PI/180;const x1=pcx+R*Math.cos(sr),y1=pcy+R*Math.sin(sr),x2=pcx+R*Math.cos(er),y2=pcy+R*Math.sin(er);return (<path d={`M${pcx},${pcy}L${x1},${y1}A${R},${R},0,${ea-sa>180?1:0},1,${x2},${y2}Z`} fill="#f0ece5" stroke={color} strokeWidth="3" onClick={()=>tapZone(zone)} style={{cursor:"pointer"}}/>);}
  // Plate edge points
  const gAng=210,vAng=330,pAng=130;
  const gEX=pcx+oR*Math.cos(gAng*Math.PI/180),gEY=pcy+oR*Math.sin(gAng*Math.PI/180);
  const vEX=pcx+oR*Math.cos(vAng*Math.PI/180),vEY=pcy+oR*Math.sin(vAng*Math.PI/180);
  const pEX=pcx+oR*Math.cos(pAng*Math.PI/180),pEY=pcy+oR*Math.sin(pAng*Math.PI/180);
  // Label boxes — large, in corners
  const gBox={x:0,y:18,w:215,h:88};   // grain: top-left
  const vBox={x:350,y:8,w:208,h:70};   // veg: top-right
  const pBox={x:0,y:340,w:230,h:70};   // protein: bottom-left
  // Line anchor points (bottom-center of top labels, top-center of bottom label)
  const gAnc={x:gBox.x+gBox.w/2, y:gBox.y+gBox.h};
  const vAnc={x:vBox.x+vBox.w/2, y:vBox.y+vBox.h};
  const pAnc={x:pBox.x+pBox.w/2, y:pBox.y};

  const hdrH=72;
  return (
    <Wrap id="plate">
      <Head title="Build a Healthy Plate" icon="🍽️"/>
      <div style={{fontSize:20,fontWeight:900,color:S.body,marginBottom:10}}>🍽️ My Healthy Plate</div>
      <p style={{fontSize:16,fontWeight:700,color:S.mid,marginBottom:10}}>📺 Click below to watch these helpful videos:</p>
      <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap",marginBottom:18,maxWidth:480,margin:"0 auto 18px"}}><a href="https://www.youtube.com/watch?v=2w4Ssp_oyRA" target="_blank" rel="noopener noreferrer" style={{textDecoration:"none",flex:1,minWidth:180}}><div style={{background:"linear-gradient(135deg,#e8f5e9,#c8e6c9)",border:"2px solid #66bb6a",borderRadius:12,padding:"12px 14px",display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:28,flexShrink:0}}>🎬</span><span style={{fontSize:15,fontWeight:800,color:"#2e7d32",lineHeight:1.3}}>What is My Healthy Plate?</span></div></a><a href="https://www.youtube.com/watch?v=CmzlNGbiGiQ" target="_blank" rel="noopener noreferrer" style={{textDecoration:"none",flex:1,minWidth:180}}><div style={{background:"linear-gradient(135deg,#fff3e0,#ffe0b2)",border:"2px solid #ffa726",borderRadius:12,padding:"12px 14px",display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:28,flexShrink:0}}>🎬</span><span style={{fontSize:15,fontWeight:800,color:"#e65100",lineHeight:1.3}}>10 Healthy Plate Ideas</span></div></a></div>
      <p style={{fontSize:16,color:S.sub,lineHeight:1.65,maxWidth:460,margin:"0 auto 10px"}}>Practise building a balanced meal. Can you spot the healthy choices?</p>
      <div style={{background:S.gbg,borderRadius:12,padding:"14px 18px",fontSize:16,color:S.body,lineHeight:1.7,textAlign:"left",maxWidth:440,margin:"0 auto 20px"}}><strong>Step 1:</strong> Select a food item from the list below.<br/><strong>Step 2:</strong> Tap a category box below the plate (or directly on the plate) to place it there.<br/><strong>Step 3:</strong> Check the feedback — it will tell you if your choice is healthy, where it belongs, and why.<br/><span style={{color:S.mid,fontSize:14}}>Not all items belong on a healthy plate — you'll learn why. Tap a selected item again to deselect it.</span></div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8,maxWidth:500,margin:"0 auto 16px"}}>{filtered.map(item=>{const isSel=sel?.id===item.id;const isDone=used.has(item.id);return (<button key={item.id} onClick={()=>!isDone&&tapItem(item)} style={{padding:"10px 4px",border:isSel?`2.5px solid ${S.g}`:"1.5px solid #ccc",borderRadius:12,background:isSel?S.gbg:isDone?"#ece9e4":"#fff",cursor:isDone?"default":"pointer",opacity:isDone?0.5:1,display:"flex",flexDirection:"column",alignItems:"center",textAlign:"center",minHeight:82}}><span style={{fontSize:30,marginBottom:3}}>{item.emoji}</span><span style={{fontSize:12,fontWeight:700,color:isDone?"#aaa":S.body,lineHeight:1.3}}>{item.name}</span><span style={{fontSize:10,color:isDone?"#bbb":S.mid,lineHeight:1.2,marginTop:2}}>{item.desc}</span></button>);})}</div>
      <div style={{marginBottom:6,fontSize:13,color:S.mid,fontWeight:600}}>Filter by ethnic food type:</div>
      <div style={{display:"flex",gap:6,marginBottom:18,flexWrap:"wrap",justifyContent:"center"}}>{[["all","All"],["chinese","Chinese"],["malay","Malay"],["indian","Indian"]].map(([k,l])=>(<button key={k} onClick={()=>setFilter(k)} style={{padding:"7px 16px",border:`1.5px solid ${filter===k?S.g:"#bbb"}`,borderRadius:18,background:filter===k?S.g:"#fff",color:filter===k?"#fff":S.sub,fontSize:14,fontWeight:700,cursor:"pointer"}}>{l}</button>))}</div>

      {/* Plate SVG — large, centered, with corner labels + dotted lines */}
      <div style={{margin:"0 auto 10px",maxWidth:560}}>
        <svg viewBox={`0 0 ${svgW} ${svgH}`} style={{width:"100%"}}>
          {/* Plate */}
          <circle cx={pcx} cy={pcy} r={oR} fill="none" stroke={S.div} strokeWidth="3"/>
          {arc(270,90,zc.veg,"veg")}
          {arc(90,180,zc.protein,"protein")}
          {arc(180,270,zc.grain,"grain")}

          {/* Dotted lines from labels to plate edge */}
          <line x1={gAnc.x} y1={gAnc.y} x2={gEX} y2={gEY} stroke={zc.grain} strokeWidth="2" strokeDasharray="5,4"/>
          <line x1={vAnc.x} y1={vAnc.y} x2={vEX} y2={vEY} stroke={zc.veg} strokeWidth="2" strokeDasharray="5,4"/>
          <line x1={pAnc.x} y1={pAnc.y} x2={pEX} y2={pEY} stroke={zc.protein} strokeWidth="2" strokeDasharray="5,4"/>

          {/* Rice, Noodles & Bread — top-left */}
          <rect x={gBox.x} y={gBox.y} width={gBox.w} height={gBox.h} rx={12} fill="#fff" stroke={zc.grain} strokeWidth="2.5" onClick={()=>tapZone("grain")} style={{cursor:"pointer"}}/>
          <text x={gBox.x+gBox.w/2} y={gBox.y+24} textAnchor="middle" fontSize="16" fontWeight="900" fill={zc.grain} fontFamily={S.h}>¼ Rice, Noodles & Bread</text>
          <text x={gBox.x+gBox.w/2} y={gBox.y+44} textAnchor="middle" fontSize="13" fontWeight="700" fill={zc.grain} fontFamily={S.f}>(wholegrains when possible)</text>
          <text x={gBox.x+gBox.w/2} y={gBox.y+66} textAnchor="middle" fontSize="14" fontWeight="700" fill={S.mid} fontFamily={S.f}>{plate.grain.length} of {max.grain} items</text>

          {/* Fruit & Veg — top-right */}
          <rect x={vBox.x} y={vBox.y} width={vBox.w} height={vBox.h} rx={12} fill="#fff" stroke={zc.veg} strokeWidth="2.5" onClick={()=>tapZone("veg")} style={{cursor:"pointer"}}/>
          <text x={vBox.x+vBox.w/2} y={vBox.y+28} textAnchor="middle" fontSize="18" fontWeight="900" fill={zc.veg} fontFamily={S.h}>½ Fruit & Veg</text>
          <text x={vBox.x+vBox.w/2} y={vBox.y+52} textAnchor="middle" fontSize="14" fontWeight="700" fill={S.mid} fontFamily={S.f}>{plate.veg.length} of {max.veg} items</text>

          {/* Protein, Meat and Others — bottom-left */}
          <rect x={pBox.x} y={pBox.y} width={pBox.w} height={pBox.h} rx={12} fill="#fff" stroke={zc.protein} strokeWidth="2.5" onClick={()=>tapZone("protein")} style={{cursor:"pointer"}}/>
          <text x={pBox.x+pBox.w/2} y={pBox.y+28} textAnchor="middle" fontSize="16" fontWeight="900" fill={zc.protein} fontFamily={S.h}>¼ Protein, Meat and Others</text>
          <text x={pBox.x+pBox.w/2} y={pBox.y+52} textAnchor="middle" fontSize="14" fontWeight="700" fill={S.mid} fontFamily={S.f}>{plate.protein.length} of {max.protein} items</text>
        </svg>
      </div>

      {/* Category item boxes below plate */}
      <div style={{display:"grid",gridTemplateColumns:"4fr 3fr 4fr",gap:10,maxWidth:560,margin:"0 auto 14px",alignItems:"start"}}>
        <div onClick={()=>tapZone("grain")} style={{cursor:"pointer"}}>
          <div style={{height:hdrH,display:"flex",flexDirection:"column",justifyContent:"flex-end",paddingBottom:4}}>
            <div style={{fontSize:16,fontWeight:900,color:zc.grain,fontFamily:S.h}}>¼ Rice, Noodles & Bread</div>
            <div style={{fontSize:12,fontWeight:600,color:zc.grain,fontStyle:"italic"}}>(wholegrains when possible)</div>
            <div style={{fontSize:14,fontWeight:700,color:S.mid}}>{plate.grain.length} of {max.grain} items added</div>
          </div>
          <div style={{border:`2px solid ${zc.grain}50`,borderRadius:12,minHeight:56,padding:"8px 6px",display:"flex",flexWrap:"wrap",gap:4,background:"#fff",justifyContent:"center",alignContent:"flex-start"}}>
            {plate.grain.length===0&&<span style={{fontSize:13,color:"#bbb",fontStyle:"italic",padding:"10px 0"}}>Tap to add</span>}
            {plate.grain.map(it=>(<span key={it.id} style={{background:zc.grain+"12",border:`1.5px solid ${zc.grain}40`,borderRadius:8,padding:"5px 10px",fontSize:12,fontWeight:700,color:S.body,whiteSpace:"nowrap"}}>{it.emoji} {it.name}</span>))}
          </div>
        </div>
        <div onClick={()=>tapZone("veg")} style={{cursor:"pointer"}}>
          <div style={{height:hdrH,display:"flex",flexDirection:"column",justifyContent:"flex-end",paddingBottom:4}}>
            <div style={{fontSize:17,fontWeight:900,color:zc.veg,fontFamily:S.h}}>½ Fruit & Veg</div>
            <div style={{fontSize:14,fontWeight:700,color:S.mid}}>{plate.veg.length} of {max.veg} items added</div>
          </div>
          <div style={{border:`2px solid ${zc.veg}50`,borderRadius:12,minHeight:56,padding:"8px 6px",display:"flex",flexWrap:"wrap",gap:4,background:"#fff",justifyContent:"center",alignContent:"flex-start"}}>
            {plate.veg.length===0&&<span style={{fontSize:13,color:"#bbb",fontStyle:"italic",padding:"10px 0"}}>Tap to add</span>}
            {plate.veg.map(it=>(<span key={it.id} style={{background:zc.veg+"12",border:`1.5px solid ${zc.veg}40`,borderRadius:8,padding:"5px 10px",fontSize:12,fontWeight:700,color:S.body,whiteSpace:"nowrap"}}>{it.emoji} {it.name}</span>))}
          </div>
        </div>
        <div onClick={()=>tapZone("protein")} style={{cursor:"pointer"}}>
          <div style={{height:hdrH,display:"flex",flexDirection:"column",justifyContent:"flex-end",paddingBottom:4}}>
            <div style={{fontSize:15,fontWeight:900,color:zc.protein,fontFamily:S.h}}>¼ Protein, Meat and Others</div>
            <div style={{fontSize:14,fontWeight:700,color:S.mid}}>{plate.protein.length} of {max.protein} items added</div>
          </div>
          <div style={{border:`2px solid ${zc.protein}50`,borderRadius:12,minHeight:56,padding:"8px 6px",display:"flex",flexWrap:"wrap",gap:4,background:"#fff",justifyContent:"center",alignContent:"flex-start"}}>
            {plate.protein.length===0&&<span style={{fontSize:13,color:"#bbb",fontStyle:"italic",padding:"10px 0"}}>Tap to add</span>}
            {plate.protein.map(it=>(<span key={it.id} style={{background:zc.protein+"12",border:`1.5px solid ${zc.protein}40`,borderRadius:8,padding:"5px 10px",fontSize:12,fontWeight:700,color:S.body,whiteSpace:"nowrap"}}>{it.emoji} {it.name}</span>))}
          </div>
        </div>
      </div>
      {renderFb()}
      {history.length>0&&<div style={{marginBottom:12,fontSize:14,color:S.mid}}>Score: <span style={{color:"#2e7d32",fontWeight:800}}>✓ {history.filter(h=>h.ok).length} correct</span>{history.some(h=>!h.ok)&&<>{" · "}<span style={{color:S.r,fontWeight:800}}>✗ {history.filter(h=>!h.ok).length} incorrect</span></>}</div>}
      <div style={{display:"flex",gap:8,justifyContent:"center",maxWidth:380,margin:"0 auto"}}><button onClick={check} style={{flex:1,padding:"13px",border:"none",borderRadius:10,background:S.g,color:"#fff",fontSize:16,fontWeight:800,cursor:"pointer"}}>✅ Check my plate</button><button onClick={reset} style={{padding:"13px 18px",border:`2px solid ${S.div}`,borderRadius:10,background:"#fff",color:S.sub,fontSize:16,fontWeight:700,cursor:"pointer"}}>🔄 Start over</button></div>
    </Wrap>
  );
}

function Res({href,name,desc}){return (<div style={{marginBottom:14}}><a href={href} target="_blank" rel="noopener noreferrer" style={{color:S.g,textDecoration:"underline",fontSize:16,fontWeight:700}}>{name}</a><div style={{fontSize:14,color:S.mid,marginTop:3}}>{desc}</div></div>);}
function FAQ(){const[open,setOpen]=useState(null);const learnMore=(<div style={{textAlign:"left",maxWidth:460,margin:"0 auto"}}><p style={{marginBottom:14}}>Here are some useful resources:</p><div style={{marginBottom:10}}><strong>General health information:</strong></div><Res href="https://hpb.gov.sg" name="Health Promotion Board" desc="Singapore's national agency for health promotion — diet, exercise, and wellness resources."/><Res href="https://www.healthhub.sg/programmes/heart-health" name="HealthHub — Heart Health" desc="Heart health programmes, articles, and tools from Singapore's health portal."/><Res href="https://activesg.gov.sg/home" name="ActiveSG" desc="Free and affordable sports facilities, fitness programmes, and community activities across Singapore."/><div style={{marginTop:18,marginBottom:10}}><strong>CVD-related information:</strong></div><Res href="https://www.myheart.org.sg" name="Singapore Heart Foundation" desc="Patient resources on heart disease prevention, symptoms, and living with heart conditions."/><Res href="https://www.nhcs.com.sg" name="National Heart Centre Singapore" desc="Singapore's specialist heart centre — patient education on heart conditions and treatments."/><Res href="https://www.ace-hta.gov.sg/healthcare-professionals/ace-repository-for-clinical-guidelines/" name="ACE Clinical Guidelines" desc="Evidence-based clinical guidelines from Singapore's Agency for Care Effectiveness."/><div style={{marginTop:18,marginBottom:10}}><strong>Precision medicine:</strong></div><Res href="https://www.npm.sg" name="PRECISE — National Precision Medicine" desc="Singapore's national programme using genomic data to improve health outcomes for the local population."/></div>);const items=[{q:"Can I change my genetic risk?",a:"No — your genes don't change. But you can lower your overall heart disease risk through diet, exercise, medication, and healthy habits. Many people with higher genetic risk never develop heart disease because they manage other risk factors well."},{q:"Should my family members get tested?",a:"Heart disease risk can run in families. If you have a higher genetic risk, it may be worth discussing genetic testing with your family members' doctors. Family members benefit from healthy lifestyle changes regardless."},{q:"How accurate are these scores?",a:(<>The polygenic risk score is an estimate based on current science — it captures a meaningful portion of genetic risk but not all of it. Your doctor considers it alongside your full health picture.<br/><br/>The 10-year clinical risk score (SG-FRS-2023) is based on established risk factors and has been adapted for the Singapore population. Unlike the genetic score, this number can change as your health indicators improve.</>)},{q:"How should I work with my doctor on this?",a:"Your PRS results have already been shared with you during consultation. Going forward, work closely with your doctor to set personal health targets — for blood pressure, cholesterol, blood sugar, and weight — and review your progress at regular follow-ups. Ask about what lifestyle changes would make the biggest difference for your specific situation."},{q:"Where can I learn more?",a:learnMore}];return (<Wrap id="faq"><Head title="Commonly Asked Questions" icon="❓" suffix="(FAQs)"/>{items.map((it,i)=>(<div key={i} style={{border:`1.5px solid ${S.div}`,borderRadius:12,marginBottom:10,overflow:"hidden"}}><button onClick={()=>setOpen(open===i?null:i)} style={{width:"100%",padding:"16px 18px",border:"none",background:open===i?S.gbg:"#fff",textAlign:"center",fontSize:17,fontWeight:800,color:S.body,cursor:"pointer",display:"flex",justifyContent:"center",alignItems:"center",gap:8,fontFamily:S.f}}><span style={{flex:1,textAlign:"center"}}>{it.q}</span><span style={{fontSize:22,color:S.g,fontWeight:900,transform:open===i?"rotate(45deg)":"none",transition:"0.2s",flexShrink:0}}>+</span></button>{open===i&&<div style={{padding:"6px 18px 16px",fontSize:16,color:S.sub,lineHeight:1.7,textAlign:"center"}}>{it.a}</div>}</div>))}</Wrap>);}
function Footer(){return (<footer style={{background:"#1a2530",color:"#ccc",padding:"32px 20px",textAlign:"center",fontSize:15,lineHeight:1.8}}><p style={{margin:"0 auto 16px",color:"#fff",fontWeight:700,fontSize:16,maxWidth:480}}>This website provides general health information and does not replace medical advice from your doctor.</p><div style={{maxWidth:480,margin:"0 auto",borderTop:"1px solid #334",paddingTop:16}}><strong style={{color:"#fff"}}>Contact information:</strong><p style={{margin:"6px auto 0",fontSize:14,lineHeight:1.7,color:"#b0bec5",maxWidth:480}}>Please contact your doctor from the endocrinology department at Tan Tock Seng Hospital if you have any further questions about your health or about this study. Alternatively, you may want to write to a study researcher, Aloysius Chia, Research Fellow at TTSH, at{" "}<a href="mailto:aloysius.wy.chia@nhghealth.com.sg" style={{color:"#80cbc4",textDecoration:"underline"}}>aloysius.wy.chia@nhghealth.com.sg</a>. Refer to the informed consent form for more information.</p></div><div style={{color:"#777",fontSize:12,marginTop:16}}>© 2026 Tan Tock Seng Hospital. All rights reserved.</div><div style={{color:"#777",fontSize:12,marginTop:4}}>Version 1.0 · April 2026</div></footer>);}

/* URL PARAMETER PARSING — replaces prototype controls */
function ga(n,p){if(typeof gtag==='function')gtag('event',n,p);}
function parseURL(){
  const sp=new URLSearchParams(window.location.search);
  const pRaw=sp.get('p'),tRaw=sp.get('t');
  const p=pRaw!==null?parseInt(pRaw):null;
  const t=tRaw!==null?parseInt(tRaw):null;
  const hiRel=(p!==null&&p>=80);
  const isDM=(p!==null&&t===null);
  let absLevel='normal';
  if(t!==null){absLevel=t>20?'high':(t>=10?'intermediate':'normal');}
  return {hiRel,absLevel,isDM};
}


function App(){
  const mode=parseURL();
  function nav(id){document.getElementById(id)?.scrollIntoView({behavior:"smooth"});}
  return (<div style={{fontFamily:S.f,background:"#fefcf8",minHeight:"100vh",maxWidth:640,margin:"0 auto",boxShadow:"0 0 40px rgba(0,0,0,0.06)",color:S.body}}><link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/><Nav onNav={nav}/><WelcomeBanner m={mode}/><Divider/><Genes/><Divider/><Action m={mode}/><Divider/><Numbers/><Divider/><PlateSection/><Divider/><FAQ/><Footer/></div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
